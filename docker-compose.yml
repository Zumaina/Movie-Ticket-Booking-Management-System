version: "3.9"

services:
  client:
    build:
      context: ./client
    container_name: cinebook-client
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src

  server:
    build:
      context: ./server
    container_name: cinebook-server
    restart: always
    ports:
      - "8000:80"
    environment:
      APP_NAME: CineBook
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: cinebook_db
      DB_USERNAME: cinebook_user
      DB_PASSWORD: cinebook_pass
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: cinebook_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cinebook_db
      MYSQL_USER: cinebook_user
      MYSQL_PASSWORD: cinebook_pass
    ports:
      - "3307:3306"
    volumes:
      - ./database/migrations/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/migrations/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./database/migrations/03_migration.sql:/docker-entrypoint-initdb.d/03_migration.sql
      - cinebook_db_data:/var/lib/mysql

volumes:
  cinebook_db_data: